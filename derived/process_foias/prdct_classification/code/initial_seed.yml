# initial_seed.yml
# Comprehensive list of seed keywords for identifying lab consumables,
# including common variations, brand names, and abbreviations.
#
# Reorganized by topic. Audit notes from prior FN/FP rounds are preserved
# inline — they record *why* a term was added or rejected, which matters
# when retuning precision/recall.
#
# MATCHING SEMANTICS (see classifier.load_keywords_and_build_automaton):
#   * Word-bounded matching with optional `(?:e?s)?` plural suffix.
#   * Internal hyphens and whitespace are equivalent — a single entry
#     `pipet-aid` also matches `pipet aid` (and vice versa). Closed-spelling
#     variants like `coverslip` (no separator) still need their own entry.
#   * Optional `all_of_groups:` section at the bottom of this file lets you
#     fire on token co-occurrence: each group is a list of word-bounded
#     tokens that must ALL appear (any order, anywhere in the description).
#     Use it when no single token is precise enough but the combination is.


  # Bulk Solvent / Commodity Chemical Indicators
  # These phrases appear on commodity chemical purchases (not lab consumables).
  # NOTE: Generic grade descriptors like "reagent grade" and "acs grade" were
  # intentionally OMITTED because lab buffers (tris, hepes) also carry those
  # labels.  Only long, unambiguous phrases are safe here.
  - for liquid chromatography
  - for spectroscopy
  - for gas chromatography
  - spectrophotometric grade
  - pesticide grade
  - toluene
  # Specific bulk solvents sold by the liter, not lab consumables.
  # Audit note: these were verified to have ~0 overlap with items
  # currently labeled lab in the training set.  Sigma grade brands
  # (bioultra, sigmaultra, chromasolv) and dichloromethane were
  # REJECTED here because they do overlap with lab-labeled buffers.
  - nitromethane
  - cyclopentane
  - hexadecane
  - chloroform-d
  - hexylene glycol

  # Deuterated NMR solvents — audit: -d6 had 1/44 lab overlap, -d8 had 1/15.
  # These markers reliably indicate NMR solvents (non-lab in this taxonomy),
  # not bench reagents.  Stricter variants (-d3/-d4/-d5/-d2) had 10-30%
  # lab overlap and were REJECTED to preserve lab recall.
  - -d6
  - -d8
  - 99.9+%
  - 99.9 atom


keyword_groups:
  # DNA-oligo subcategorization.  OLIGO_WORD is a broad "this-is-an-oligo"
  # signal (oligo/primer/sirna/grna).  OLIGO_MODIFIER lists the
  # 5'/3'-modification tokens that force the "- modified" subcategory.
  # OLIGO_PURIFIED lists the PAGE/HPLC purification phrases.  Large-scale
  # (>= 1 umol) is handled via regex_any_of in the rule itself since it
  # requires numeric matching.

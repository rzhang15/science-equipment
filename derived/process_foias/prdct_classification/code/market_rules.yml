# Custom primer F/R suffix from oligo vendors — Invitrogen / Life Tech /
# Fisher Scientific descriptions ending in a word + punctuation/space +
# F or R token ("iha.sybr.F", "something_R", "primer-F") are primers.
# Uses case_sensitive=true so the supplier token and the trailing F/R
# are checked against the raw description where they appear verbatim.
- name: synthetic dna oligonucleotide - desalted
  case_sensitive: true
  any_of:
  - '*INVITROGEN*'
  - '*INVITROGE*'
  - '*LIFE TECH*'
  - '*LIFE TECHNOLOGIES*'
  - '*FISHER SCI*'
  - '*FISHER SCIENTIFIC*'
  - '*THERMO FISHER*'
  regex_any_of:
  # At least one word char, a separator (hyphen / dot / underscore /
  # space), then F or R, then end-of-string or another separator.
  - '\w[\-._ ][FR](?=$|[\s\-._])'


# =============================================================================
# market_rules.yml
# =============================================================================
#
# SEMANTICS
# ---------
# This file is evaluated FIRST-MATCH-WINS by get_market_overrides_batch in
# rule_based_categorizer.py.  Rules run top-to-bottom; once a rule claims a
# row, every later rule skips it.  ORDER IS BEHAVIOR, not cosmetics.
#
# When adding a new rule, place specific variants BEFORE general ones.
#
# Known ordering invariants — DO NOT violate when editing:
#   * Oligo / primer rules precede restriction-enzyme rules (L~860).  Primer
#     descriptions routinely carry restriction-site names ("F_BamHI_primer"),
#     so the wrong order collapses oligos into the enzyme market.
#   * DMEM/F-12 rules precede generic DMEM rules (L~3145).
#   * Specific cell-culture antibiotics (pen-strep, puromycin, geneticin,
#     blasticidin, hygromycin, zeocin) precede any generic "cell culture
#     antibiotic" rule.  No rule emits "cell culture antibiotics - other";
#     that label comes from the expert model for descriptions with no hit.
#
# FILE LAYOUT
# ---------
#   hierarchical_veto_rules ......................... L~65   (prefix-based)
#   required_keywords (expert-side vetoes) .......... L~80   (see VETO LOOKUP)
#   keyword_groups (aliases: $NAME) ................. L~200
#   market_rules .................................... L~820  (the big list)
#
# RULE FAMILIES (approximate; use `grep -n "- name: X"` for exact hits)
#   non-lab / shipping / freight ................... L~820, L~2970, L~4775+
#   oligos / primers / siRNA / shRNA ............... L~860–L~950 (main)
#   antibodies + ELISA ............................. L~1110–L~1690, L~4910+
#   enzymes / nucleic-acid modifying ............... L~1700–L~1755, L~3030+
#   PCR / thermocycler / qPCR ...................... L~1760–L~1975 (main)
#   chemicals / reagents ........................... L~2090–L~2630 (main)
#   nucleic-acid extraction / purification ......... L~2210–L~2450, L~2630+
#   affinity / chromatography resins ............... L~2695–L~2870
#   cell culture media / supplements ............... L~3130–L~3265 (main)
#   plasticware misc (beakers, funnels, cylinders) . L~3455+
#   cell culture plastics / well plates ............ L~3635–L~3715 (main)
#   tubes / vials / caps ........................... L~3735–L~3970 (main)
#   instruments / equipment ........................ L~3985+
#   pipettes / pipette tips / dispensers ........... L~4005–L~4530 (main)
#   labware detergents / gloves / wipes ............ L~2615+, L~4540+, L~4800+
#
# TAIL SECTIONS — these are a MIGRATION QUEUE, not a permanent location.
# They were added chronologically as eval-driven rescue passes.  Each rule
# should ideally migrate up into its topical home above; they live at the
# bottom only so first-match-wins lets them run after general rules.
#   Recall-rescue batch 1 ........................... L~5265
#   Recall-rescue batch 2 ........................... L~5545
#   Recall-rescue sibling confusion ................. L~5880
#
# VETO LOOKUP
# ---------
# `required_keywords` below gates EXPERT-model predictions (not market-rule
# outputs — rules run after the veto).  If a category's recall looks low,
# check both: (a) is a market rule stealing it? and (b) does a veto entry
# require a keyword that isn't in the descriptions?  Current veto targets:
#   t4 polynucleotide kinase, laminin, human, tris base, acetone,
#   acetic acid, dmf, reverse transcriptase, rnase inhibitors, us fbs,
#   bovine serum albumin, crystallizing dishes, laemmli sample buffer,
#   polyclonal primary antibody, monoclonal primary antibody,
#   polyclonal secondary antibody, monoclonal secondary antibody,
#   (and ~12 more — see the full dict below).
# =============================================================================


  - '*vial plug*'
  - '*wide vial flug*'
  - '*wide vial plug*'
  - '*flugs*'

# Hydrion — brand of pH indicator / pH paper strips.  Expert model sees
# "hydri" and predicts "sodium hydride".
- name: ph paper and other test strips
  any_of:
  - '*hydrion*'

# Isotope-labeled ammonium chloride (15N) — research tracer, not the
# cell-biology "ammonium chloride" reagent.  Override to irrelevant chemicals.
- name: irrelevant chemicals - inorganic salts
  all_of:
  - '*ammonium*'
  - '*chloride*'
  any_of:
  - '*15n*'
  - '*(15n*'
  - '*nlm-*'

# William's Medium E and MCDB 131 containing glutamine — specialty media,
# not l-glutamine supplement.  Expert model predicts l-glutamine because

  any_of:
  - '*william*medium*'
  - '*williams*medium*'
  - '*mcdb 131*'
  none_of:
  - '*supplement*'
  - '*l-glutamine only*'

# Luciferase protein alone (without "assay", "kit", or "reporter" context)
# — expert model predicts "bioluminescence assay kit".  The enzyme itself is
# a purified protein / purified enzyme.  Quantilum is Promega's brand for
# recombinant luciferase but umich labels it as bioluminescence — exclude.

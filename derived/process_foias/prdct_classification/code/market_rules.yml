# -----------------------------------------------------------------------------
# RNA purification / extraction disambiguation (placed BEFORE generic column-
# based rna rules so first-match-wins routes the special cases correctly):
#   - Plant RNA kits  -> column-based plant rna purification kits
#   - DNA + RNA kits  -> column-based dna and rna extraction kits
#   - Maxwell / Dynabead / Magna + RNA -> magnetic-bead based rna purification
#   - Trizol / DirectZol / RNA Bee / STAT-60 / Ribozol  -> rna extraction reagents
# -----------------------------------------------------------------------------

# Trizol / DirectZol family — acid-guanidinium RNA extraction reagents.
# Placed before the column-based rules because DirectZol was incorrectly
# routed to column-based previously.
- name: rna extraction reagents
  any_of:
  - '*trizol*'
  - '*tri-reagent*'
  - '*tri reagent*'
  - '*qiazol*'
  - '*directzol*'
  - '*direct-zol*'
  - '*direct zol*'
  - '*rna-bee*'
  - '*rna bee*'
  - '*stat-60*'
  - '*ribozol*'

# Maxwell / Dynabead / Magna — all are magnetic-bead based, not column-based.
# Requires an RNA indicator so the rule only fires on RNA kits; DNA / protein
# Maxwell kits keep their own categories.  Uses the singular training label
# `magnetic-bead based purification kit` (no RNA/DNA split in the taxonomy).
- name: magnetic-bead based purification kit
  all_of:
  - '*rna*'
  - $ASSAY_OR_KIT
  any_of:
  - '*maxwell*'
  - '*dynabead*'
  - '*dyna bead*'
  - '*dyna-bead*'
  - '*magna*'
  - '*magnetic bead*'
  - '*magnetic-bead*'
  none_of:
  - '*antibod*'
  - '*immunoprecipitation*'

# Plant RNA — "plant" + "rna" + kit token.  Excludes dna-only kits.
- name: column-based plant rna purification kits
  all_of:
  - '*plant*'
  - '*rna*'
  - $ASSAY_OR_KIT
  none_of:
  - '*dna*'
  - '*maxwell*'
  - '*dynabead*'
  - '*magna*'
  - '*magnetic*'


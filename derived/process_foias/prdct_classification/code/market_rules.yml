market_rules:
# If, after cleaning (lowercase, stopwords like "and"/"the" removed, units &
# SKUs stripped, whitespace collapsed), the description is nothing but a
# shipping/freight/handling phrase, it's not a lab item. exact_any_of anchors
# ^...$ so this only fires when the WHOLE cleaned description is one of these.
- name: Non-Lab
  exact_any_of:
  - shipping
  - shipping handling
  - shipping handling charge
  - shipping handling charges
  - shipping handling fee
  - shipping handling fees
  - shipping handling cost
  - shipping handling costs
  - shipping charge
  - shipping charges
  - shipping fee
  - shipping fees
  - shipping cost
  - shipping costs
  - freight
  - freight charge
  - freight charges
  - freight fee
  - freight fees
  - freight cost
  - freight costs
  - handling
  - handling charge
  - handling charges
  - handling fee
  - handling fees
  - postage
  - postage fee
  - postage charge
  - delivery
  - delivery charge
  - delivery charges
  - delivery fee
  - delivery fees
# ---------------------------------------------------------------------------
# Oligonucleotide rules MUST come before `restriction enzymes` — synthetic
# primers and oligos routinely carry restriction-site names in their
# descriptions (e.g. "F_BamHI_primer", "_SacI site"), and first-match-wins
# would otherwise misfile them under the enzyme market.
#
# DNA oligo subcategory precedence when multiple signals co-occur:
#   modified > purified > large scale > desalted (default)
# A PAGE-purified FAM-labeled 1 umol oligo lands in "- modified".
# ---------------------------------------------------------------------------
- name: synthetic sirna
  all_of:
  - sirna
  - '*oligo*'
- name: synthetic sirna
  all_of:
  - sirna
  - configurationid
# DNA oligo: modified (5'/3' fluorophore, quencher, chemical modification)
- name: synthetic dna oligonucleotide - modified
  all_of:
  - $OLIGO_WORD
  - dna
  - $OLIGO_MODIFIER
# DNA oligo: PAGE / HPLC purified
- name: synthetic dna oligonucleotide - purified
  all_of:
  - $OLIGO_WORD
  - dna
  - $OLIGO_PURIFIED
# DNA oligo: large scale (>= 1 umol).  Scales below 1 umol are reported in
# nmol (25/100/250 nmol); however, some procurement exports (e.g. UMich's
# "0.0250 umo") write sub-1-umol scales in umol units, so we require the
# integer part of the umol quantity to be >= 1 (first digit non-zero).
- name: synthetic dna oligonucleotide - large scale
  all_of:
  - $OLIGO_WORD
  - dna
  regex_any_of:
  - '(?i)(?<!\w)[1-9]\d*(?:\.\d+)?\s*[µu]mol(?!\w)'
  - '(?i)(?<!\w)[1-9]\d*(?:\.\d+)?\s*umo(?!\w)'
# DNA oligo: desalted (default when no subcategory signal fires)
- name: synthetic dna oligonucleotide - desalted
  all_of:
  - '*oligo*'
  - dna
- name: synthetic rna oligonucleotide
  all_of:
  - '*oligo*'
  - rna
# Structural-name primer rule: catches oligos whose descriptions don't
# include the word "oligo" but carry tell-tale primer markers —
# _F / _R / _fwd / _rev / _forward / _reverse suffixes, forward/reverse
# primer phrasing, guide RNAs, and sticky-end / Gateway cloning tokens.
# Defaults to the "- desalted" subcategory; bare primer names almost never
# carry modifier / purification / scale descriptors, so desalted is the
# correct default.
- name: synthetic dna oligonucleotide - desalted
  regex_any_of:
  # _F / _R / _F2 / _R1 at end of a multi-char identifier or before a separator.
  # The (?<=\w{3}) guard avoids matching trivial 2-char tokens like "a_F".
  - '(?<=\w{3})_[FR]\d*(?=$|[\s\-])'
  # _fwd / _rev / _forward / _reverse, token-bounded
  - '(?i)_(?:fwd|rev|forward|reverse)(?=$|[\s\-])'
  # Forward / reverse primer phrasing in either order
  - '(?i)\b(?:forward|reverse)\s+primer\b'
  - '(?i)\bprimer\s+(?:forward|reverse)\b'
  # Reverse-complement phrasing — canonical primer-pair descriptor
  - '(?i)\b(?:rev|reverse)\s+complement\b'
  # IDT / oligo-order metadata tokens.  Every one of these is nearly
  # exclusive to custom oligo order sheets.  Verified 0 hits among true
  # restriction-enzyme / chemistry / consumable items in UMich hold-out.
  - '(?i)\bbase\s*pair\s+\d+\s+scale\b'
  - '(?i)\bconfigurationid\b'
  - '(?i)\bpackagetype\b'
  - '(?i)\btypecode\b'
  - '(?i)\bsynthesis\s+scale\b'
  # Mutagenesis primer phrasing ("mutant-b rev", "mut5 fwd").  Does NOT
  # include bare "site-directed" — that belongs to the
  # site-directed-mutagenesis-systems category.
  - '(?i)\b(?:mutant|mutagenesis|mut\d+)\s+(?:fwd|rev|forward|reverse|primer|[fr])\b'
  # Direction marker at start of description ("rev 2nd overlap papxgfp").
  # Only the abbreviations (rev/fwd) — the full words "reverse" /
  # "forward" are excluded because they also start non-oligo phrases
  # like "reverse transcriptase" and "forward scatter".
  - '(?i)^(?:rev|fwd)\s+\w'
  # Direction marker at end of a digit-bearing slug (UMich primer SKUs:
  # "pmi3228 fw", "tcf7 109 rev", "c3019del fw").  Requires the preceding
  # slug to carry a digit, which avoids matching "m-mlv rev" or "mutagen
  # rev" where the preceding token is pure alpha.
  - '(?i)\b\w*\d\w*[\s_\-](?:fw|fwd|rev|reverse)$'
  # Reverse-primer / forward-primer shorthand (rp / fp) at end of slug.
  # Unlike rev/reverse, "rp" and "fp" are essentially never meaningful
  # suffixes outside primer naming, so no digit guard is needed.
  - '(?i)\b\w{3,}[\s_\-](?:rp|fp)\d*$'
  # Mutagenesis primer with optional intermediate token ("mutant-b rev",
  # "mutagen c rev", "mut5 fwd") — the already-listed mutagenesis_primer
  # pattern requires whitespace directly after "mutant"; this variant
  # permits a short token between.
  - '(?i)\bmut(?:ant|agenesis|\d+)?[\s\-_]\w*[\s\-_](?:fwd|rev|forward|reverse|primer)\b'
  # Concatenated slug+direction: "d9mit226rev", "hoxa10chiprev4", "c2405checkfwd"
  - '(?i)\b[a-z0-9]{3,}(?:rev|fwd|forward|reverse)\d*\b'
  # Suffix-compounded primer naming: "confirmf", "chiprev", "seq 1r", "checkfwd"
  - '(?i)(?:^|[\s_\-])confirm[fr]\d*\b'
  - '(?i)(?:^|[\s_\-])(?:chip|check)[a-z]*[fr]\d*\b'
  - '(?i)\bseq\s*\d*\s*[rf]\d*\b'
  # Guide / synthetic RNAs
  - '(?i)\bsgrna\b'
  - '(?i)\bgrna\b'
  - '(?i)\bshrna\b'
  # Sticky-end & Gateway cloning oligo markers
  - '(?i)sticky[\s_]end'
  - '(?i)\batt[bplr]\d?\b'
  # Bare-word "oligo" fallback — runs after the DNA/RNA-specific rules
  # above so siRNA / DNA / RNA disambiguation still wins when explicit
  # markers are present.  Defaults to DNA oligo when the description says
  # only "oligo" (and never reaches here for paint/spray primers because
  # the gatekeeper already filtered those as non-lab).
  - '(?i)\boligo\w*'
# Enzyme-name + oligo-marker rule.  Verified 0/1047 true restriction-enzyme
# items in UMich contain tokens like fwd/sense/adaptor/sequence/promoter/
# chip/gene — real enzyme orders are bone-simple (enzyme + maybe fastdigest
# / hf / units / mg).  So co-occurrence of an enzyme name with any of these
# markers means the description is an oligo/primer that happens to mention
# a cloning site, not an enzyme product.  Defaults to desalted.
- name: synthetic dna oligonucleotide - desalted
  all_of:
  - $RESTRICTION_ENZYME
  regex_any_of:
  - '(?i)\b(?:fw|fwd|forward|rev|reverse)\b'
  - '(?i)\b(?:sense|antisense)\b'
  - '(?i)\b(?:adaptor|adapter|linker|overhang)\b'
  - '(?i)\b(?:prime|primer)\b'
  - '(?i)\bsequence\b'
  - '(?i)\bprom(?:oter)?\b'
  - '(?i)\bchip\b'
  - '(?i)\bgene\b'
- name: restriction enzymes
  case_sensitive: true
  any_of:
  - $RESTRICTION_ENZYME
  none_of:
  - '*ConfigurationID*'
  - '*Synthesis Scale*'
  - '*DNA Oligo*'
  - '*Oligo Name*'
  - '*Sequence (5*'
  - '*Cloning site*'
  - '*cloning site*'
  - '*Gene Synthesis*'
  - '*gene synthesis*'
  # Oligo / primer context markers — case-insensitive so we catch any
  # capitalization the procurement system emits.  Each expression opts in to
  # IGNORECASE via (?i) because the enclosing rule is case_sensitive.
  #
  # All tokens below were verified against 1047 true restriction-enzyme
  # items in UMich hold-out: 0 collisions.  Real enzyme descriptions are
  # bone-simple (enzyme name + maybe fastdigest / hf / units / mg), so any
  # co-occurrence with these markers indicates an oligo with a cloning-site
  # reference, not an enzyme product.
  regex_none_of:
  - '(?i)\boligo\w*'
  - '(?i)\bprimer\w*'
  - '(?i)\bsgrna\b'
  - '(?i)\bgrna\b'
  - '(?i)\bsirna\b'
  - '(?i)\bshrna\b'
  - '(?i)sticky[\s_]end'
  - '(?i)_(?:fwd|rev|forward|reverse)(?=$|[\s\-])'
  - '(?i)(?<=\w{3})_[FR]\d*(?=$|[\s\-])'
  - '(?i)\batt[bplr]\d?\b'
  # Direction / strand / primer-design markers (0 FN verified)
  - '(?i)\b(?:fw|fwd|forward|rev|reverse)\b'
  - '(?i)\b(?:sense|antisense)\b'

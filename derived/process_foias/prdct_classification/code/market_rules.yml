  # for "BglII"), and OCR'd PDFs.  Adding both the canonical CamelCase form
  # and the lowercase-l typo lets rule 1 / the enzyme-regex fallback claim
  # them.
  - Smal           # SmaI typo
  - Notl           # NotI typo
  - Xhol           # XhoI typo
  - Xbal           # XbaI typo
  - Sphl           # SphI typo
  - Pstl           # PstI typo
  - Pvul           # PvuI typo
  - Pvul-HF        # PvuI-HF typo
  - Sall           # SalI typo
  - Sail-HF        # SalI-HF typo
  - SaII-HF        # SalI-HF typo (capital I doubled)
  - Ndel           # NdeI typo
  - Ncol           # NcoI typo
  - Nsil           # NsiI typo
  - Bcll           # BclI typo
  - BspEl          # BspEI typo
  - Bglll          # BglII typo (3 lowercase l's)
  - BgIII          # BglII typo (capital I in middle)
  - Sacl           # SacI typo
  - Snabl          # SnaBI typo
  - SNABL          # SnaBI all-caps typo
  - Hindlll        # HindIII typo
  - Eco-R1-HF      # EcoRI-HF formatting variant
market_rules:
# If, after cleaning (lowercase, stopwords like "and"/"the" removed, units &
# SKUs stripped, whitespace collapsed), the description is nothing but a
# shipping/freight/handling phrase, it's not a lab item. exact_any_of anchors
# ^...$ so this only fires when the WHOLE cleaned description is one of these.
- name: Non-Lab
  exact_any_of:
  - shipping
  - shipping handling
  - shipping handling charge
  - shipping handling charges
  - shipping handling fee
  - shipping handling fees
  - shipping handling cost
  - shipping handling costs
  - shipping charge
  - shipping charges
  - shipping fee
  - shipping fees
  - shipping cost
  - shipping costs
  - freight
  - freight charge
  - freight charges
  - freight fee
  - freight fees
  - freight cost
  - freight costs
  - handling
  - handling charge
  - handling charges
  - handling fee
  - handling fees
  - postage
  - postage fee
  - postage charge
  - delivery
  - delivery charge
  - delivery charges
  - delivery fee
  - delivery fees
# UMich procurement order-confirmation note text — reproduced verbatim on
# every line item ("******SEND ORDER CONFIRMATION TO KASI@MED.UMICH.EDU******").
# Contains "KASI" which the enzyme-regex fallback in rule_based_categorizer.py
# parses as the KasI restriction enzyme, sweeping ~330 fees rows into
# `restriction enzymes` because the fallback runs without a none_of guard.
# Claim them as Non-Lab here so they're locked before the fallback fires.
- name: Non-Lab
  any_of:
  - '*send order confirmation*'
  - '*send an order confirmation*'
  - '*send the order confirmation*'
  - '*please send order confirmation*'
  - '*order confirmation to*@*'
# ---------------------------------------------------------------------------
# Oligonucleotide rules MUST come before `restriction enzymes` — synthetic
# primers and oligos routinely carry restriction-site names in their
# descriptions (e.g. "F_BamHI_primer", "_SacI site"), and first-match-wins
# would otherwise misfile them under the enzyme market.
#
# DNA oligo subcategory precedence when multiple signals co-occur:
#   modified > purified > large scale > desalted (default)
# A PAGE-purified FAM-labeled 1 umol oligo lands in "- modified".
# ---------------------------------------------------------------------------
- name: synthetic sirna
  all_of:
  - sirna
  - '*oligo*'
- name: synthetic sirna
  all_of:
  - sirna
  - configurationid
- name: synthetic sirna
  all_of:
  - sirna
  - control 
# shRNA (short hairpin RNA) — distinct from generic synthetic-rna-oligo.
# Placed before the rna-oligo rule so shRNA descriptions (e.g.
# MISSION shRNA, pLKO shRNA) aren't claimed by the broader `*oligo* + rna`
# rule and relabeled as synthetic rna oligonucleotide.
- name: synthetic shrna
  any_of:
  - '*shrna*'
  - '*sh-rna*'
  - '*short hairpin*'
  none_of:
  - '*type dna oligos*'
  regex_none_of:
  # DNA oligo ordering metadata — when "shrna" appears in a synthetic DNA
  # oligo name (e.g., cloning insert templates), these fields are present.
  - '(?i)\bsequence\b'
  - '(?i)\bnmole?\b'
  - '(?i)\bpurification\b'
  - '(?i)\bdesalt\w*'
  - '(?i)\bbases?\b'
# shRNA-named DNA oligo cloning inserts — descriptions containing "shrna"
# plus oligo-order metadata (sequence / nmol / bases) are DNA templates for
# cloning shRNA, NOT actual synthetic shRNA.  Placed immediately after the
# shRNA rule so these items get routed to DNA oligos before the restriction
# enzyme fallback fires on any cloning-site overhangs they carry.
# Two rules: one for "shrna", one for "sh-rna" — using all_of so the shRNA
# keyword AND the metadata signal are BOTH required (not OR'd).
- name: synthetic dna oligonucleotide - desalted
  all_of:
  - '*shrna*'
  regex_any_of:
  - '(?i)\bsequence\b'
  - '(?i)\bnmole?\b'
  - '(?i)\bpurification\b'
  - '(?i)\bdesalt\w*'
  - '(?i)\bbases?\b'
- name: synthetic dna oligonucleotide - desalted
  all_of:
  - '*sh-rna*'
  regex_any_of:
  - '(?i)\bsequence\b'
  - '(?i)\bnmole?\b'
  - '(?i)\bpurification\b'
  - '(?i)\bdesalt\w*'
  - '(?i)\bbases?\b'
# DNA oligo: modified (5'/3' fluorophore, quencher, chemical modification)
- name: synthetic dna oligonucleotide - modified
  all_of:
  - $OLIGO_WORD
  - dna
  - $OLIGO_MODIFIER
# DNA oligo: PAGE / HPLC purified
- name: synthetic dna oligonucleotide - purified
  all_of:
  - $OLIGO_WORD
  - dna
  - $OLIGO_PURIFIED
# DNA oligo: large scale (>= 1 umol).  Scales below 1 umol are reported in
# nmol (25/100/250 nmol); however, some procurement exports (e.g. UMich's
# "0.0250 umo") write sub-1-umol scales in umol units, so we require the
# integer part of the umol quantity to be >= 1 (first digit non-zero).
- name: synthetic dna oligonucleotide - large scale
  all_of:
  - $OLIGO_WORD
  - dna
  regex_any_of:
  - '(?i)(?<!\w)[1-9]\d*(?:\.\d+)?\s*[µu]mol(?!\w)'
  - '(?i)(?<!\w)[1-9]\d*(?:\.\d+)?\s*umo(?!\w)'
# DNA oligo: desalted (default when no subcategory signal fires)
- name: synthetic dna oligonucleotide - desalted
  all_of:
  - '*oligo*'
  - dna
- name: synthetic rna oligonucleotide
  all_of:
  - '*oligo*'
  - rna
  none_of:
  - '*shrna*'
  - '*sh-rna*'
  - '*short hairpin*'
  - '*type dna oligos*'
# EBS (Exon Binding Site) / IBS (Intron Binding Site) primer labels.
# These are the RNA-RNA base-pairing regions of group II introns — a
# primer bearing an EBS<N> / IBS<N> tag is a synthetic RNA oligo designed
# for TargeTron-style intron retargeting.  Placed before the structural
# DNA-primer rule below so "EBS1-F" / "IBS2_rev" resolve to RNA (not DNA).
# The numbered suffix disambiguates from "IBS" (irritable bowel syndrome)
# and other 3-letter acronyms.
- name: synthetic rna oligonucleotide
  regex_any_of:
  # Paired EBS/IBS in a single token — requires both markers, which is
  # unambiguous group II intron RNA signal. The numbered form EBS1/IBS2 is
  # intentionally excluded: TargeTron DNA primers routinely carry those
  # labels, so numbered-only EBS/IBS is not a reliable RNA discriminator.
  - '(?i)\b(?:EBS[-_/\s]+IBS|IBS[-_/\s]+EBS)\b'
# RNA oligo explicit signals — "rna duplex" and "rna oligo" without "oligo"
# keyword would miss the all_of:[*oligo*, rna] rule above.  These catch
# stand-alone "100 nmole rna duplex" / "rna oligo 25mer" style descriptions.
- name: synthetic rna oligonucleotide
  all_of:
  - rna
  - duplex
  none_of:
  - '*sirna*'
  - '*shrna*'
  - '*dsrna*'
  - '*double stranded*'
  - '*double-stranded*'
- name: synthetic rna oligonucleotide
  all_of:
  - '*rna oligo*'
  none_of:
  - '*shrna*'
  - '*sirna*'
# Numbered EBS/IBS labels (EBS1, EBS2, EBS1d, IBS2 etc.) are TargeTron
# retargeting DNA primers — NOT synthetic RNA oligos.  Route them to
# synthetic dna oligonucleotide - desalted before the enzyme fallback fires,
# which would mislabel "spea-ebs1d" as a restriction enzyme (SpeI match).
- name: synthetic dna oligonucleotide - desalted
  regex_any_of:
  - '(?i)\b(?:EBS|IBS)\d+[a-z]?\b'
# Structural-name primer rule: catches oligos whose descriptions don't
# include the word "oligo" but carry tell-tale primer markers —
# _F / _R / _fwd / _rev / _forward / _reverse suffixes, forward/reverse
# primer phrasing, guide RNAs, and sticky-end / Gateway cloning tokens.
# Defaults to the "- desalted" subcategory; bare primer names almost never
# carry modifier / purification / scale descriptors, so desalted is the
# correct default.
- name: synthetic dna oligonucleotide - desalted
  regex_any_of:
  # _F / _R / _F2 / _R1 at end of a multi-char identifier or before a separator.
  # The (?<=\w{3}) guard avoids matching trivial 2-char tokens like "a_F".
  - '(?<=\w{3})_[FR]\d*(?=$|[\s\-])'
  # _fwd / _rev / _forward / _reverse, token-bounded
  - '(?i)_(?:fwd|rev|forward|reverse)(?=$|[\s\-])'
  # Forward / reverse primer phrasing in either order
  - '(?i)\b(?:forward|reverse)\s+primer\b'
  - '(?i)\bprimer\s+(?:forward|reverse)\b'
  # Reverse-complement phrasing — canonical primer-pair descriptor
  - '(?i)\b(?:rev|reverse)\s+complement\b'
  # IDT / oligo-order metadata tokens.  Every one of these is nearly
  # exclusive to custom oligo order sheets.  Verified 0 hits among true
  # restriction-enzyme / chemistry / consumable items in UMich hold-out.
  - '(?i)\bbase\s*pair\s+\d+\s+scale\b'
  - '(?i)\bconfigurationid\b'
  - '(?i)\bpackagetype\b'
  - '(?i)\btypecode\b'
  - '(?i)\bsynthesis\s+scale\b'
  # Mutagenesis primer phrasing ("mutant-b rev", "mut5 fwd").  Does NOT
  # include bare "site-directed" — that belongs to the
  # site-directed-mutagenesis-systems category.
  - '(?i)\b(?:mutant|mutagenesis|mut\d+)\s+(?:fwd|rev|forward|reverse|primer|[fr])\b'
  # Direction marker at start of description ("rev 2nd overlap papxgfp").
  # Only the abbreviations (rev/fwd) — the full words "reverse" /
  # "forward" are excluded because they also start non-oligo phrases
  # like "reverse transcriptase" and "forward scatter".
  - '(?i)^(?:rev|fwd)\s+\w'
  # Direction marker at end of a digit-bearing slug (UMich primer SKUs:
  # "pmi3228 fw", "tcf7 109 rev", "c3019del fw").  Requires the preceding
  # slug to carry a digit, which avoids matching "m-mlv rev" or "mutagen
  # rev" where the preceding token is pure alpha.
  - '(?i)\b\w*\d\w*[\s_\-](?:fw|fwd|rev|reverse)$'
  # Reverse-primer / forward-primer shorthand (rp / fp) at end of slug.
  # Unlike rev/reverse, "rp" and "fp" are essentially never meaningful
  # suffixes outside primer naming, so no digit guard is needed.
  - '(?i)\b\w{3,}[\s_\-](?:rp|fp)\d*$'
  # Mutagenesis primer with optional intermediate token ("mutant-b rev",
  # "mutagen c rev", "mut5 fwd") — the already-listed mutagenesis_primer
  # pattern requires whitespace directly after "mutant"; this variant
  # permits a short token between.
  - '(?i)\bmut(?:ant|agenesis|\d+)?[\s\-_]\w*[\s\-_](?:fwd|rev|forward|reverse|primer)\b'
  # Concatenated slug+direction: "d9mit226rev", "hoxa10chiprev4", "c2405checkfwd"
  - '(?i)\b[a-z0-9]{3,}(?:rev|fwd|forward|reverse)\d*\b'
  # Suffix-compounded primer naming: "confirmf", "chiprev", "seq 1r", "checkfwd"
  - '(?i)(?:^|[\s_\-])confirm[fr]\d*\b'
  - '(?i)(?:^|[\s_\-])(?:chip|check)[a-z]*[fr]\d*\b'
  - '(?i)\bseq\s*\d*\s*[rf]\d*\b'
  # Guide / synthetic RNAs
  - '(?i)\bsgrna\b'
  - '(?i)\bgrna\b'
  - '(?i)\bshrna\b'
  # Sticky-end & Gateway cloning oligo markers
  - '(?i)sticky[\s_]end'
  - '(?i)\batt[bplr]\d?\b'
  # Bare-word "oligo" fallback — runs after the DNA/RNA-specific rules
  # above so siRNA / DNA / RNA disambiguation still wins when explicit
  # markers are present.  Defaults to DNA oligo when the description says
  # only "oligo" (and never reaches here for paint/spray primers because
  # the gatekeeper already filtered those as non-lab).
  - '(?i)\boligo\w*'
# Plasmid / cloning-construct rule.  Catches the GenScript / IDT / custom-
# cloning order descriptions that pack vector name, insert, and cloning
# site into a single procurement line ("Vector name:pET-21a(+) Cloning
# site:NdeI/HindIII", "ExpressCloning:GFPxm163_pcDNA3.1(+)Plasmid Name:...",
# "Mutagenesis:..._pET21a(+)Cloning site:..."). Without this rule, those
# rows fall through to the enzyme-regex fallback and get tagged as
# `restriction enzymes` because they mention enzyme cut sites.  Placed
# BEFORE the oligo-rescue rule so plasmid constructs (which carry
# `vector name:` / `plasmid name:` / `mutagenesis:` markers) are claimed as
# plasmids rather than oligos.  All four sibling categories listed below
# collapse to `expression plasmids` via CATEGORY_CONSOLIDATION at script 0
# / script 3, so the rule's emitted name is interchangeable.
- name: synthetic bacterial expression plasmids
  any_of:
  - '*vector name:*'
  - '*vector name :*'
  - '*plasmid name:*'
  - '*plasmid name :*'
  - '*expresscloning:*'
  - '*express cloning:*'
  - '*genpluscloning*'
  - '*custom cloning:*'
  - '*mutagenesis:*'
  - '*target insert name:*'
# Syringes with abbreviated descriptions — "luer-lok syr", "syrg nd" etc.
# Must come before the cloning-site oligo rule (Rule 19) which has a
# combined (?i) that makes [FR][_-][A-Z] case-insensitive, so "luer-lok"
# matches the [a-zA-Z][FR][_-][A-Z] pattern due to "r-l".
- name: syringes
  any_of:
  - '*luer-lok syr*'
  - '*luer lok syr*'
  - '*luer syr*'
  - '*lr-lk syr*'
  - '*luer lock syr*'
  - '*luer-lock syr*'
  - '*luer-lok*'
  - '*luerlok*'
- name: syringes
  all_of:
  - '*syringe*'
  none_of:
  - '*filter*'
  - '*tip*'
  - '*pump*'
  - '*driver*'
  - '*plunger*'
  - '*needle free*'
  - '*needlefree*'
- name: syringes
  any_of:
  - '*syrg nd*'
  - '*syrg w/nd*'
  - '* syrg *'
# Oligos where the primer name embeds a restriction site as a cloning tag.
# The main desalted rule below catches fwd/rev/forward/reverse but misses
# single-letter F/R tokens (mid-string or end) and the 3-letter "_For" suffix.
# case_sensitive: true routes matching to the raw description.
#
# Original rule: requires word-bounded enzyme in all_of, but fails when:
#   (a) the enzyme is all-uppercase ("XHOI" ≠ "XhoI" case-sensitively)
#   (b) the enzyme is not in $RESTRICTION_ENZYME (e.g. standalone SbfI)
#   (c) the F/R is stripped from clean_desc by the preprocessor
# New rule below uses a case-insensitive enzyme-stem regex in regex_any_of
# to catch all three failure modes.
- name: synthetic dna oligonucleotide - desalted
  case_sensitive: true
  regex_any_of:
  # Enzyme stem (case-insensitive) followed by space/sep + F or R + end.
  # Catches "Sort SbfI R", "idsD sphI F", "CHIF 891 STOP XHOI R", etc.
  # The (?i) makes the enzyme-stem pattern and [FR] both case-insensitive.
  - '(?i)\b(?:bamh|ecor?v?|hind|xho|xba|xma|sal|sph|sac|kpn|not|nhe|cla|bgl|pst|pvu|spe|nco|nde|pac|pci|pme|sbf|mfe|mlu|stu|sma|sca|nar|dra|mbo|blp|bgl|avr|bsr|bss|bss|bsm|bst|bsu|bcu|bfa|bse|age|ale|alu|ase|ava|afl|acl|mfe|pml|nsi|msl|xcm|bstx|pflm|bcc|bse|fau|tsp|msp|hpa|scr|styd|bsaj|bsl|btg|nci|mnl|bbv|bpu|bsu|eco|dpn|msp|hae|hinf|csp|sau3a)\w*i\b.*[\s._\-][FR]\d*\s*$'
  # F at very start of identifier before underscore/hyphen: "F_extension_XmaI"
  - '^[FR][_\-]'
  # F or R embedded in compound identifier before underscore/hyphen to uppercase:
  # "genomicF_KpnI", "fliCF-PmeI" (any letter + F/R + sep + uppercase = cloning site)
  - '[a-zA-Z][FR][_\-][A-Z]'
- name: synthetic dna oligonucleotide - desalted
  case_sensitive: true
  all_of:
  - $RESTRICTION_ENZYME
  regex_any_of:
  - '(?i)(?:^|[\s._\-])[FR]\d{0,2}\s*$'
  - '(?i)^[FR]\d{0,2}[\s._\-]'
  - '(?i)[\s._\-][FR]\d{0,2}[\s._\-]\w'
  - '(?i)[._\-][Ff]or\d*\s*$'
# Enzyme-name + oligo-marker rule.  Verified 0/1047 true restriction-enzyme
# items in UMich contain tokens like fwd/sense/adaptor/sequence/promoter/
# chip/gene — real enzyme orders are bone-simple (enzyme + maybe fastdigest
# / hf / units / mg).  So co-occurrence of an enzyme name with any of these
# markers means the description is an oligo/primer that happens to mention
# a cloning site, not an enzyme product.  Defaults to desalted.
- name: synthetic dna oligonucleotide - desalted
  all_of:
  - $RESTRICTION_ENZYME
  regex_any_of:
  - '(?i)\b(?:fw|fwd|forward|rev|reverse)\b'
  - '(?i)\b(?:sense|antisense)\b'
  - '(?i)\b(?:adaptor|adapter|linker|overhang)\b'
  - '(?i)\b(?:prime|primer)\b'
  - '(?i)\bsequence\b'
  - '(?i)\bprom(?:oter)?\b'
  - '(?i)\bchip\b'
  - '(?i)\bgene\b'
  # Primer-direction suffix tokens: ".F" / "-F" / "_F" / " F" (and Fwd/Rev
  # variants, with optional trailing index digits) at end of description.
  # Matches "0744 AscI F", "GeneX-R", "construct.Fwd", "name_R2".
  - '(?i)[._\-\s]([FR]|[Ff]wd|[Rr]ev)\d*\s*$'
  # Forward/reverse synonyms commonly used in primer naming.
  - '(?i)\bstart\b'
  - '(?i)\bend\b'
  - '(?i)\bupstream\b'
  - '(?i)\bdownstream\b'
  - '(?i)\b(?:upper|lower)\b'
  # Cloning-construct / synthetic-DNA context markers — if any appear next
  # to an enzyme name, the row is a primer / gene fragment / plasmid, not
  # an enzyme order.
  - '(?i)\bplasmid\b'
  - '(?i)\bvector\b'
  - '(?i)\bconstruct\b'
  - '(?i)\bfragment\b'
  - "(?i)\\b\\d+\\s?bp\\b"
  - '(?i)\bkb\b'
  - '(?i)\bnmole?\b'
  - '(?i)\bpmole?\b'
  - '(?i)\bdesalt\w*'
  - '(?i)\bpurification\b'
  - '(?i)\bsynthesis\b'
  # Primer-direction short words: "up" / "dn" (upstream/downstream) and
  # "left" / "right" are never in real enzyme descriptions.
  - '(?i)\b(?:up|dn)\b'
  - '(?i)\b(?:left|right)\b'
  # Gene / context abbreviations that appear in primer names with cloning sites
  # but never in genuine enzyme product orders.
  - '(?i)\bctx\b'
  - '(?i)(?:^|[\s_\-])myc(?:[\s_\-]|\d|$)'
- name: restriction enzymes
  case_sensitive: true
  any_of:
  - $RESTRICTION_ENZYME
  none_of:
  - '*ConfigurationID*'
  - '*Synthesis Scale*'
  - '*DNA Oligo*'
  - '*Oligo Name*'
  - '*Sequence (5*'
  - '*Cloning site*'
  - '*cloning site*'
  - '*Gene Synthesis*'
  - '*gene synthesis*'
  # Oligo / primer context markers — case-insensitive so we catch any
  # capitalization the procurement system emits.  Each expression opts in to
  # IGNORECASE via (?i) because the enclosing rule is case_sensitive.
  #
  # All tokens below were verified against 1047 true restriction-enzyme
  # items in UMich hold-out: 0 collisions.  Real enzyme descriptions are
  # bone-simple (enzyme name + maybe fastdigest / hf / units / mg), so any
  # co-occurrence with these markers indicates an oligo with a cloning-site
  # reference, not an enzyme product.
  regex_none_of:
  - '(?i)\boligo\w*'
  - '(?i)\bprimer\w*'
  - '(?i)\bsgrna\b'
  - '(?i)\bgrna\b'
  - '(?i)\bsirna\b'
  - '(?i)\bshrna\b'
  - '(?i)sticky[\s_]end'
  - '(?i)_(?:fwd|rev|forward|reverse)(?=$|[\s\-])'
  - '(?i)(?<=\w{3})_[FR]\d*(?=$|[\s\-])'
  # Bare F/R / Fwd/Rev primer-direction tokens that follow the enzyme name
  # with any of the common primer-naming delimiters (.  -  _  space) and sit
  # at the end of the description.  Catches e.g. "0744 AscI F", "X.f",
  # "geneX-R2", "construct.Fwd".
  - '(?i)[._\-\s]([FR]|[Ff]wd|[Rr]ev)\d*\s*$'
  - '(?i)\batt[bplr]\d?\b'
  # Direction / strand / primer-design markers (0 FN verified)
  - '(?i)\b(?:fw|fwd|forward|rev|reverse)\b'
  - '(?i)\b(?:sense|antisense)\b'
  - '(?i)\b(?:adaptor|adapter|linker|overhang)\b'
  - '(?i)\bprime\b'
  - '(?i)\bsequence\b'
  - '(?i)\bprom(?:oter)?\b'
  - '(?i)\bchip\b'
  - '(?i)\bdna\b'
  - '(?i)\brna\b'
  - '(?i)\bgene\b'
  # Forward/reverse synonyms used in primer naming — "5' start", "3' end",
  # "upper", "lower", "top", "bottom", "upstream", "downstream".  Real enzyme
  # descriptions never carry these tokens.
  - '(?i)\bstart\b'
  - "(?i)5['′]?[\\s\\-_]?\\bstart\\b"
  - "(?i)3['′]?[\\s\\-_]?\\bend\\b"
  - '(?i)\bupstream\b'
  - '(?i)\bdownstream\b'
  - '(?i)\b(?:upper|lower)\b'
  # Cloning-construct / plasmid / synthetic-DNA markers.  Real enzyme
  # descriptions never carry these tokens; if any of them shows up alongside
  # an enzyme name, the row is a plasmid, gene fragment, or oligo construct.
  - '(?i)\bplasmid\b'
  - '(?i)\bvector\b'
  - '(?i)\bconstruct\b'
  - '(?i)\bfragment\b'
  - "(?i)\\b\\d+\\s?bp\\b"
  - '(?i)\bnmole?\b'
  - '(?i)\bpmole?\b'
  - '(?i)\bdesalt\w*'
  - '(?i)\bpurification\b'
  - '(?i)\bsynthesis\b'
  # Cloning-construct protein/tag markers.  Items like "gfp kdel noti" or
  # "mcherry-xhoi" are plasmid/oligo constructs that mention restriction
  # sites, not enzyme orders.  Verified against UMich enzyme hold-out: real
  # enzyme descriptions never carry these tokens.
  - '(?i)\bgfp\b'
  - '(?i)\byfp\b'
  - '(?i)\bcfp\b'
  - '(?i)\brfp\b'
  - '(?i)\bmcherry\b'
  - '(?i)\bmneongreen\b'
  - '(?i)\bmscarlet\b'
  - '(?i)\bkdel\b'
  - '(?i)\bflag\b'
  - '(?i)\bha-?tag\b'
  - '(?i)\bmyc-?tag\b'
  - '(?i)\bcas9\b'

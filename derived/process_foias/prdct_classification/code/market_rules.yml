# Purified enzymes - transferases.  Audited against UMich ground-truth
# (`category` column, post-step-0 consolidation): this bucket is a broad
# procurement label for "purified enzymes sourced from organisms" rather
# than a strict EC-class-2 grouping — it lumps in many hydrolases / lyases
# / isomerases / ligases (apyrase, aldolase, glucosidases, amylases,
# invertase, isomerases, deaminases, cellulase, amidase, ubiquitin
# activating enzyme) alongside the actual transferases (GST, transaminase,
# transglutaminase, hexokinase, pyruvate kinase, etc.).
#
# Rule searches `clean_desc` (case-insensitive default), which strips the
# Sigma packaging stopwords FROM / GRADE / TYPE, so anchored patterns like
# "*apyrase from*" never match.  Use bare enzyme names with a strong
# none_of to keep antibody clones, primer gene names, OriGene cDNA clones,
# kits, and small-molecule inhibitors out of the bucket.  Placed AFTER
# terminal transferase / T4 PNK / creatine kinase rules so the nucleic-
# acid-modifying variants claim their rows first.  Antibody rules at L~1110
# fire even earlier and steal "RABBIT MUSC" / "RABBIT MUSCLE" patterns
# verbatim — those losses are documented and tracked separately.
- name: purified enzymes - transferases
  any_of:
  # ---- Actual transferases (GST / transaminase / kinase family) ----
  - '*glutathione s-transferase*'
  - '*glutathion-s-transferase*'
  - '*glutathione transferase*'
  - '*aspartate aminotransferase*'
  - '*alanine aminotransferase*'
  - '*aminotransferase*'
  - '*transaminase*'
  - '*transglutaminase*'
  - '*sulfotransferase*'
  - '*glycosyltransferase*'
  - '*hexokinase*'
  - '*pyruvate kinase*'
  - '*acetate kinase*'
  - '*adenylate kinase*'
  - '*myokinase*'
  - '*phosphoglycerate kinase*'
  - '*phosphoglyceric phosphokinase*'
  - '*phosphofructokinase*'
  - '*protein kinase a, catalytic*'
  - '*protein kinase*catalytic subunit*'
  - '*rhodanese*'
  # ---- Hydrolases lumped into this bucket by the GT taxonomy ----
  - '*apyrase*'
  - '*aldolase*'
  - '*b-glucosidase*'
  - '*β-glucosidase*'
  - '*beta-glucosidase*'
  - '*alpha-glucosidase*'
  - '*a-glucosidase*'
  - '*α-glucosidase*'
  - '*b-galactosidase*'
  - '*β-galactosidase*'
  - '*beta-galactosidase*'
  - '*amyloglucosidase*'
  - '*a-amylase*'
  - '*α-amylase*'
  - '*alpha-amylase*'
  - '*b-amylase*'
  - '*β-amylase*'
  - '*beta-amylase*'
  - '*invertase*'
  - '*amidase recombinant*'
  - '*amidase*'
  - '*cellulase*'
  # ---- Isomerases / ligases / deaminases also lumped here ----
  - '*triosephosphate isomerase*'
  # Ubiquitin-activating enzyme: only the Sigma abbreviated form
  # ("HMN UBIQUITIN ACT. ENZ") is in GT transferases.  The "E-305 Ubiquitin
  # Activating Enzyme (UBE1)" / "UBIQUITIN ACTIVATING ENZYME E1, HUMAN"
  # variants live in `other` / `purified proteins` / `recombinant proteins`,
  # so we deliberately don't match the full-word form.
  - '*ubiquitin act. enz*'
  - '*hmn ubiquitin act*'
  # Adenosine deaminase: only the "(ADA); from <organism>" Sigma form is in
  # GT transferases.  Bare "ADENOSINE DEAMINASE BOVINE IN" / "LS009043
  # ADENOSINE DEAMINASE" live in other / deaminases / dehydrogenases.
  - '*adenosine deaminase (ada)*'

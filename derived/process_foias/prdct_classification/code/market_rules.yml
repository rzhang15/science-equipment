# Restriction enzymes — bare enzyme names written with a space between the
# prefix and the "I" ("Mse I", "Sfi I") that the word-bounded existing rule
# misses.  Regex allows "Xxx I", "Xxx II", "Xxx III" optionally followed by
# a digit (unit size) or end-of-token.  Prefix list extended with
# `bgl|fspe|sap|ahd|sfo|bpi|bsu|psp|bsmb|eco53|cfr|aor|mph|lgu|pme`
# for enzymes seen in UMich GT but absent from the original alternation.
# Suffix kept at `i+` (NOT `[iIlL1]+`) — the lowercase-l-for-I typo path is
# handled by adding typo variants to the RESTRICTION_ENZYME keyword group
# instead.  `[iIlL1]+` was tested and immediately matched "smaLL", "taiL",
# "smaLLEST" via the `sma`/`tai` prefixes, sweeping ~1100 unrelated rows
# (lab coats, cell scrapers, rat tail products) into restriction enzymes.
- name: restriction enzymes
  regex_any_of:
  - '(?i)\b(?:mse|dde|sfi|ssp|bspe|bsph|srf|mfe|mme|blp|aar|bamh|bbs|bcu|bsa|bsb|bsm|bsmb|bst|bsu|cla|dpn|eag|eco[rt]?|eco53|hae|hind|kpn|nco|nde|nhe|not|pac|pci|pst|pvu|rsr|sal|sbf|sma|sph|stu|swa|xba|xho|xma|sau3a|alu|sac|nar|spe|scai?|sge|agei?|hinf|msc|mly|mnl|mva|nae|nru|pfoi?|plei?|psi|pshai?|ssti?|taqi?|tli?|tsp|ava|banii?|bmgbi|btgi|dra|drdi|fsei?|fspe|hgai?|mboii?|mfei?|mjai?|mlui?|mslii?|pci|pvu|sal|spli?|taii?|bgl|sap|ahd|sfo|bpi|psp|cfr|aor|mph|lgu|pme)\s*i+\s*(?:\d|$|\b|u\b|units)'
  regex_none_of:
  # Oligo / primer context — real enzyme orders are bone-simple (enzyme + maybe
  # hf / units / fastdigest).  Any of the tokens below co-occurring with an
  # enzyme stem name means the row is a primer with a cloning site, not an enzyme.
  - '(?i)\b(?:fwd|forward|rev|reverse)\b'
  - '(?i)\b(?:primer|oligo)\w*'
  - '(?i)\b(?:up|dn)\b'
  - '(?i)\b(?:left|right)\b'
  - '(?i)\b(?:site|insert|coding|amplif)\w*'
  - '(?i)\b(?:ctx|ext)\b'
  - '(?i)(?:^|[\s_\-])myc(?:[\s_\-]|\d|$)'
  - '(?i)\b(?:gene|dna|sequence|fragment|vector|plasmid|construct)\b'
  - '(?i)\b(?:helix|loop|stem)\b'
  # Descriptions with 2 or more enzyme-stem tokens are almost certainly
  # multi-site primers, not enzyme products.
  - '(?i)(?:\b(?:bamh|ecor?v?|hind|xho|xba|xma|sal|sph|sac|kpn|not|nhe|cla|bgl|pst|pvu|spe|nco|nde|sbf|mfe)\w*i\b.*){2}'

# Purified proteins — native proteins sourced from specific organisms / tissues
# (collagen from calf skin, myosin from rabbit muscle, keyhole limpet
# hemocyanin).  Excludes recombinant (which has its own category family).
- name: purified proteins
  any_of:

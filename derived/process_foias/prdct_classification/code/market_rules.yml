# ----------------------------------------------------------------------------
# TBE buffer / TBE gels / tubing — pre-empt the $TUBE alias.  $TUBE expands
# to '*tube*|*tb*|*tbe*|*tub*', and the bare '*tbe*' / '*tub*' tokens leak
# into "TBE Buffer" / "TBE Gel" / "MICRO RENATHANE TUBING" / "TYG TUB ..."
# descriptions whenever a $TUBE-using rule's none_of doesn't list them.
# Claim these as their correct categories here so the tube rules below
# never see them.  GT label counts in UMich: tbe buffer (64), pre-cast tbe
# gels (82), nonlab - tubing (843).
- name: tbe buffer
  any_of:
  - '*tbe buffer*'
  - '*tbe 10x*'
  - '*10x tbe*'
  - '*10 x tbe*'
  - '*5x tbe*'
  - '*tris/boric*edta*'
  - '*tris-borate-edta*'
  - '*tris borate edta*'
  - '*tbe ne diluent*'
  none_of:
  - '*gel*'
  - '*precast*'
  - '*pre-cast*'
- name: pre-cast tbe gels
  any_of:
  - '*tbe gel*'
  - '*tbe-urea gel*'
  - '*tbe urea gel*'
  - '*mini-protean*tbe*'
  - '*mini protean*tbe*'
  - '*criterion*tbe*'
  - '*tbe precast*'
  - '*tbe pre-cast*'
# ----------------------------------------------------------------------------
# 'TBE' / 'TB' as a "tube" abbreviation (NOT TBE buffer/gel).  Supplier
# descriptions like "15M TBE PP/FLT/ST/GRD RK500CS" or "5ML TBE PS\STR" use
# TBE = tube; co-occurring tokens are form-factor abbreviations (PP/PS =
# polypropylene/polystyrene, FLT = flat, ST/STR = sterile, GRD = graduated,
# RK = rack pack).  Placed BEFORE the Non-Lab tubing rule and the size-based
# microcentrifuge / centrifuge-conical rules so the abbreviated forms route
# correctly instead of falling through to Non-Lab or being shoved into
# nearest-cosine categories ("pre-cast tbe gels", "tissue clearing
# solution", "rnase") by the Expert Model.
- name: centrifuge tubes
  any_of:
  - '*tbe pp*'
  - '*tbe ps*'
  - '*tbe flt*'
  - '*tbe grd*'
  - '*tbe str*'   # 'TBE STR' (sterile) -- space variant; pattern compiles to tbe[\s-]?str so it also catches 'tbe-str'
  - '*tbe rk*'
  - '*mltbe str*'  # '14MLTBE STR', 'fb14mltbe str' -- 14 mL conical tube
  none_of:
  - '*gel*'
  - '*precast*'
  - '*pre-cast*'
  - '*buffer*'
  - '*tubing*'
  - '*dilu*'
  - '*tygon*'
  - '*ladder*'
  - '*snap*'
  - '*snp*'
  - '*mcrtbe*'
  - '*mcrtub*'
  - '*test*'
  - '*sc mcr*'
  - '*cult*'
# 'TB' (standalone token) + conical-size + form-factor descriptor.  Catches
# "TB 15ML CLR PP FLAT CAP", "TB 15ML CLR PP FLT BULK", "TUBE CONIC 15ML
# W/RACK"-style strings that lack the literal word "tube" / "conical" in a
# form the size-based rule below can latch onto.
- name: centrifuge tubes
  all_of:
  - tb
  any_of:
  - '*15ml*'
  - '*15 ml*'
  - '*50ml*'
  - '*50 ml*'
  - '*30ml*'
  - '*30 ml*'
  none_of:
  - '*tbe gel*'
  - '*precast*'
  - '*pre-cast*'
  - '*buffer*'
  - '*tubing*'
  - '*tygon*'
  - '*pcr*'
  - '*test*'
  - '*filter*'
  - '*fltr*'
  - '*microfg*'
  - '*microfuge*'
  - '*ladder*'
  - '*cult*'    # cell culture tubes (CULT TB 15ML BORO) -- different category
  - '*snap*'    # snap-cap tubes belong to test tubes
# 'TB' / 'TUB' (standalone) + microcentrifuge-size + form-factor descriptor:
# "2.OML CONCL TB STR CP", "HLT 0.6ML TB NS", "HLT 2ML TUB GRD NSTCLR",
# "HLT 2.0ML TUB NS SCRWCP".  Targets the small-volume microcentrifuge form
# only -- explicitly excludes 15/30/50 mL conical sizes (handled above).
- name: microcentrifuge tubes
  any_of:
  - '*tb str*'
  - '*tb ns*'
  - '*tb-ns*'
  - '*tub grd*'
  - '*tub-grd*'
  - '*tub ns*'
  - '*tub-ns*'
  - '*tub scrwcp*'
  - '*tub-scrwcp*'
  - '*concl tb*'
  - '*conical tb*'
  none_of:
  - '*15ml*'
  - '*15 ml*'
  - '*50ml*'
  - '*50 ml*'
  - '*30ml*'
  - '*30 ml*'
  - '*tbe gel*'
  - '*precast*'
  - '*pre-cast*'
  - '*buffer*'
  - '*tubing*'
  - '*tygon*'
  - '*pcr*'
  - '*strip*'  # 'tb strip cap' is a PCR strip cap, not a microcentrifuge tube
  - '*easystrip*'
# Microcentrifuge tube spelling variants in supplier descriptions that the
# size-based / `micro+$TUBE` rules miss because the word "micro" doesn't
# appear: MCROTBES (microtubes), MCROFG / MICROFG (microfuge), MICTUBE,
# SCMTUBE (screw-cap microtube), GRDTB (graduated tube).
- name: microcentrifuge tubes
  any_of:
  - '*mcrotbe*'
  - '*mcrofg*'
  - '*microfg*'
  - '*mictube*'
  - '*mctube*'
  - '*scmtube*'
  - '*grdtb*'
  - '*microtb*'
  - '*mcrtub*'
  none_of:
  - '*rack*'
  - '*rcks*'
  - '*box*'
  - '*holder*'
# Bare 'mct' token (microcentrifuge tube) -- 97% of standalone "mct"
# descriptions in UMich supplier data are microcentrifuge tubes.  Catches
# "1.5ml nature mct", "mct n/s 0.6ml bl", "mct n/s 1.5ml yw 500/pkmct" that
# the existing `mct + $TUBE` rule misses when the description has no
# tube/tb/tbe token.
- name: microcentrifuge tubes
  all_of:
  - mct
  none_of:
  - '*rack*'
  - '*rcks*'
  - '*box*'
  - '*holder*'
  - '*stand*'
  - '*tip*'
  - '*grinder*'

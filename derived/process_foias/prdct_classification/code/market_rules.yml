# --- Reducing agents - dtt ---
# UMich uses "reducing agents - dtt" for ALL reducing agents including BME.
# Add mercaptoethanol and cleland's reagent to this category.
- name: reducing agents - dtt
  any_of:
  - '*mercaptoethanol*'
  - '*beta-mercaptoethanol*'
  - '*β-mercaptoethanol*'
  - '*bme*'
  none_of:
  - '*antibod*'
